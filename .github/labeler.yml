# .github/labeler.yml

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'client/**/*'

backend:
  - changed-files:
      - any-glob-to-any-file:
          - 'server/**/*'

devops:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'docker-compose.yml'
          - '**/Dockerfile'
          - '**/.dockerignore'
          - '.github/workflows/**/*'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '*.md'
          - '**/*.md'
          - 'docs/**/*'
          - 'README.md'
          - 'CONTRIBUTING.md'
          - 'CODE_OF_CONDUCT.md'
          - 'LICENSE'

security:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*auth*'
          - '**/helmet*'
          - '**/rate-limit*'
          - '**/.env.example'
          - 'docs/SECURITY.md'
          - 'server/firebaseAdmin.js'
          - 'server/middleware/**/*'

UI:
  - changed-files:
      - any-glob-to-any-file:
          - 'client/src/**/*.css'
          - 'client/src/**/*.scss'
          - 'client/src/components/**/*.jsx'
          - 'client/src/pages/**/*.jsx'
          - 'client/DesignSystem.md'

bug:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.js'
          - '**/*.spec.js'
          - 'server/tests/**/*'
          - 'client/src/utils/**/*'

enhancement:
  - changed-files:
      - any-glob-to-any-file:
          - 'client/src/components/**/*.jsx'
          - 'client/src/pages/**/*.jsx'
          - 'server/routes/**/*.js'
          - 'server/models/**/*.js'

refactor:
  - changed-files:
      - any-glob-to-any-file:
          - 'server/**/*.js'
          - 'client/src/**/*.js'
          - 'client/src/**/*.jsx'
          - 'server/lib/**/*.js'
          - 'server/services/**/*.js'