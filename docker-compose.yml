services:
  mongo:
    image: mongo:7
    container_name: fitmart-mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db
      
volumes:
  mongo-data:version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: fitmart-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
